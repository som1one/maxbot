services:
  backend:
    build:
      context: .
    container_name: maxbot-backend
    command: ["sh", "-c", "alembic upgrade head && python main.py backend"]
    network_mode: host
    env_file:
      - .env
    environment:
      TZ: ${TZ:-UTC}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build:
      context: .
    container_name: maxbot-bot
    command: ["python", "main.py", "bot"]
    network_mode: host
    env_file:
      - .env
    environment:
      TZ: ${TZ:-UTC}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: public.ecr.aws/docker/library/postgres:15
    container_name: maxbot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kvtservice}
      POSTGRES_USER: ${POSTGRES_USER:-kvt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      TZ: ${TZ:-UTC}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: maxbot-mailhog
    profiles: ["dev"]
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped


volumes:
  pgdata:
